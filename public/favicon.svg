<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Space &amp; Commands — ship and bridge</title>
  <defs>
    <linearGradient id="hull" x1="0" y1="0.45" x2="1" y2="0.55">
      <stop offset="0%" stop-color="#9eb0cc"/>
      <stop offset="45%" stop-color="#5c6b82"/>
      <stop offset="100%" stop-color="#343d4e"/>
    </linearGradient>
    <linearGradient id="hullShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="bridgeGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8fff4"/>
      <stop offset="55%" stop-color="#5ee0d0"/>
      <stop offset="100%" stop-color="#2a8a7c"/>
    </linearGradient>
    <linearGradient id="plume" x1="1" y1="0.5" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="35%" stop-color="#ffb04a"/>
      <stop offset="100%" stop-color="#e83820" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bridgeFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a7a90"/>
      <stop offset="100%" stop-color="#3d4758"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#070b14"/>

  <circle cx="11" cy="15" r="0.75" fill="#d4e4ff" opacity="0.5"/>
  <circle cx="52" cy="12" r="0.55" fill="#fff" opacity="0.35"/>
  <circle cx="48" cy="52" r="0.65" fill="#9ec4ff" opacity="0.4"/>

  <!-- Main ship (left): hull + wings + engines -->
  <g transform="translate(0 1)">
    <path
      d="M 36 31.5 L 14 38 L 14 34 L 8 33.5 L 8 29.5 L 14 29 L 14 25 Z"
      fill="url(#hull)"
      stroke="#2a3444"
      stroke-width="0.9"
      stroke-linejoin="round"
    />
    <path
      d="M 36 31.5 L 14 38 L 14 34 L 8 33.5 L 8 29.5 L 14 29 L 14 25 Z"
      fill="url(#hullShade)"
    />
    <!-- Wing strakes -->
    <path d="M 22 29 L 28 27 L 30 31.5 L 22 33 Z" fill="#4a5568" opacity="0.85"/>
    <path d="M 22 34 L 28 36 L 30 31.5 L 22 30 Z" fill="#3a4455" opacity="0.88"/>
    <!-- Nose accent -->
    <path d="M 32 28.5 L 36 31.5 L 32 34.5 Z" fill="#5ee0d0" opacity="0.35"/>
    <!-- Engine bells -->
    <path d="M 8 29.5 L 4 30.5 L 4 32.5 L 8 33.5 Z" fill="#2a303c" stroke="#1a2030" stroke-width="0.5"/>
    <!-- Thruster plume -->
    <path d="M 4 30.4 L 1.2 31.5 L 4 32.6 Z" fill="url(#plume)" opacity="0.92"/>
  </g>

  <!-- Captain's bridge module (right), beside the ship -->
  <g transform="translate(0 0.5)">
    <!-- Structural base -->
    <path
      d="M 40.5 40 L 40.5 28 L 56 28 L 58 32 L 58 38 L 56 42 L 40.5 42 Z"
      fill="url(#bridgeFrame)"
      stroke="#2a3444"
      stroke-width="0.85"
      stroke-linejoin="round"
    />
    <!-- Panoramic window band -->
    <rect x="42" y="30" width="13.5" height="6" rx="1.2" fill="url(#bridgeGlass)" opacity="0.92"/>
    <rect x="42" y="30" width="13.5" height="6" rx="1.2" fill="none" stroke="#5ee0d0" stroke-width="0.55" opacity="0.65"/>
    <!-- Window mullions -->
    <line x1="45.5" y1="30.3" x2="45.5" y2="35.7" stroke="#0c1816" stroke-opacity="0.35" stroke-width="0.45"/>
    <line x1="49.5" y1="30.3" x2="49.5" y2="35.7" stroke="#0c1816" stroke-opacity="0.35" stroke-width="0.45"/>
    <line x1="53.5" y1="30.3" x2="53.5" y2="35.7" stroke="#0c1816" stroke-opacity="0.35" stroke-width="0.45"/>
    <!-- Command dome -->
    <ellipse cx="49.25" cy="27" rx="7.2" ry="4.2" fill="url(#bridgeGlass)" opacity="0.55"/>
    <ellipse cx="49.25" cy="27" rx="7.2" ry="4.2" fill="none" stroke="#5ee0d0" stroke-width="0.5" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="55.5" y1="24" x2="57.5" y2="18" stroke="#7a8aa0" stroke-width="0.65" stroke-linecap="round"/>
    <circle cx="57.5" cy="18" r="0.9" fill="#5ee0d0" opacity="0.75"/>
    <!-- Docking / link hint to ship -->
    <path d="M 38 33 L 40.5 33" stroke="#5ee0d0" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
